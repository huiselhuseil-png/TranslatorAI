<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: url('https://i.pinimg.com/1200x/42/e4/45/42e445b2a6e64dbecb1840ca7c1fe30f.jpg');
            --choco-bg: url('https://i.pinimg.com/736x/c6/4e/e1/c64ee1326f40cb79dd5936ade21b514b.jpg');
            --lace-transparent: url('https://i.postimg.cc/RCWt0Lwj/oo.png');
            --bow-transparent: url('https://i.postimg.cc/NFZfyTq1/o4.png');
            --corner-l-transparent: url('https://i.postimg.cc/dkZsHQdZ/o.png');
            --corner-r-transparent: url('https://i.postimg.cc/T1K3Y0S2/o2.png');
            --cream: #fdfaf5;
            --btn-overlay: rgba(166, 141, 133, 0.75);
            --text-color: #4e342e;
        }
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f3e5f5; font-family: 'Playfair Display', serif; }
        .phone {
            width: 380px; height: 750px; background-image: var(--main-bg); background-size: cover;
            border-radius: 45px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden;
            display: flex; flex-direction: column; border: 10px solid white; position: relative;
        }
        header { background-image: var(--choco-bg); background-size: 100% 120px; background-repeat: no-repeat; padding-top: 15px; position: relative; z-index: 100; height: 70px; }
        .corner-png { position: absolute; top: 0px; width: 65px; height: 65px; z-index: 10; background-size: contain; background-repeat: no-repeat; }
        .left-corner { left: 2px; background-image: var(--corner-l-transparent); }
        .right-corner { right: 2px; background-image: var(--corner-r-transparent); }
        .welcome-card { background-color: var(--cream); margin: 0 50px; padding: 8px 5px; border-radius: 25px 25px 0 0; text-align: center; margin-top: 10px; }
        .welcome-card h1 { font-family: 'Amatic SC', cursive; font-size: 28px; color: var(--text-color); margin: 0; letter-spacing: 4px; }
        .lace-divider { height: 35px; width: 100%; background-image: var(--lace-transparent); background-repeat: repeat-x; background-size: contain; position: relative; z-index: 7; }
        .bow-icon { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 45px; height: 45px; z-index: 25; background-size: contain; background-repeat: no-repeat; background-image: var(--bow-transparent); }
        .content { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; overflow-y: auto; }
        .back-btn { text-decoration: none; color: var(--text-color); font-family: 'Quicksand'; font-weight: bold; font-size: 13px; align-self: flex-start; transition: 0.3s; }
        .back-btn:hover { opacity: 0.7; }
        .lang-toggle {
            display: flex; justify-content: space-between; align-items: center; width: 80%;
            background: white; padding: 8px 15px; border-radius: 50px;
            font-family: 'Quicksand'; font-weight: bold; color: var(--text-color); font-size: 13px;
            border: 1px solid rgba(0,0,0,0.1); cursor: pointer; margin-top: 5px;
        }
        .mic-container {
            width: 100px; height: 100px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(166, 141, 133, 0.3);
            border: 4px solid var(--cream); cursor: pointer; position: relative;
            transition: 0.3s; margin-top: 5px;
        }
        .mic-container:active { transform: scale(0.95); }
        .mic-icon { font-size: 35px; }
    
        .pulse {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid #a68d85; animation: pulse-animation 1.5s infinite;
            display: none;
        }
        @keyframes pulse-animation { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .status-text { font-family: 'Quicksand'; color: var(--text-color); font-size: 12px; font-weight: bold; margin: 0; }
        .chat-area {
            width: 100%; flex-grow: 1; background: rgba(255, 255, 255, 0.4);
            border-radius: 30px; padding: 15px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 10px; box-sizing: border-box;
        }
        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 20px; font-family: 'Quicksand'; font-size: 13px; line-height: 1.4; }
        .ai-bubble { background: var(--cream); color: var(--text-color); align-self: flex-start; border: 1px solid #eee; }
        .user-bubble { background: var(--btn-overlay); color: white; align-self: flex-end; }
        .input-bar { width: 100%; display: flex; gap: 10px; align-items: center; padding-bottom: 10px; }
        .text-input { flex-grow: 1; background: white; border-radius: 50px; border: 1px solid #ddd; padding: 10px 15px; font-family: 'Quicksand'; outline: none; }
        .send-btn { background: var(--btn-overlay); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; }
        footer { height: 60px; position: relative; }
        .music { position: absolute; left: 5px; bottom: 5px; width: 150px; mix-blend-mode: multiply; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="phone">
        <header>
            <div class="corner-png left-corner"></div>
            <div class="corner-png right-corner"></div>
            <div class="welcome-card"><h1>GRAMMAR AI</h1></div>
            <div class="lace-divider"><div class="bow-icon"></div></div>
        </header>
        <main class="content">
            <a href="index.html" class="back-btn">⬅ Back to Menu</a>
            <div class="lang-toggle" onclick="switchLanguages()">
                <span id="fromLang">English</span>
                <span id="swapIcon">⇄</span>
                <span id="toLang">Mongolian</span>
            </div>
            <div class="mic-container" id="micBtn" onclick="toggleMic()">
                <div class="pulse" id="pulseRing"></div>
                <span class="mic-icon">🎤</span>
            </div>
            <p class="status-text" id="statusMsg">Tap to Speak</p>

            <div class="chat-area" id="chatWindow">
                <div class="bubble ai-bubble">Sain baina uu! I'm your tutor. Tell me something and I'll help you with grammar!</div>
            </div>
            <div class="input-bar">
                <input type="text" class="text-input" id="chatInput" placeholder="Ask me anything...">
                <button class="send-btn" onclick="askAI()">✨</button>
            </div>
        </main>
        <footer>
            <img src="https://i.pinimg.com/474x/7b/bc/4b/7bbc4b637b57ff4c91dbd17858ddc234.jpg" class="music">
        </footer>
    </div>
    <script>
        const apiKey = "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";
        let recognition;
        let isListening = false;
        let isEnglishToMongolian = true;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.onresult = (event) => {
                const speechText = event.results[0][0].transcript;
                addBubble(speechText, 'user');
                processWithAI(speechText);
                stopMicUI();
            };
            recognition.onerror = () => stopMicUI();
            recognition.onend = () => stopMicUI();
        }
        function switchLanguages() {
            isEnglishToMongolian = !isEnglishToMongolian;
            document.getElementById('fromLang').innerText = isEnglishToMongolian ? "English" : "Mongolian";
            document.getElementById('toLang').innerText = isEnglishToMongolian ? "Mongolian" : "English"
            if (recognition) {
                recognition.lang = isEnglishToMongolian ? 'en-US' : 'mn-MN';
            }
        }
        function toggleMic() {
            if (!recognition) {
                alert("Speech recognition not supported in this browser");
                return;
            }
            if (!isListening) {
                recognition.lang = isEnglishToMongolian ? 'en-US' : 'mn-MN';
                recognition.start();
                isListening = true;
                document.getElementById('pulseRing').style.display = 'block';
                document.getElementById('statusMsg').innerText = "Listening... ✨";
            } else {
                recognition.stop();
            }
        }
        function stopMicUI() {
            isListening = false;
            document.getElementById('pulseRing').style.display = 'none';
            document.getElementById('statusMsg').innerText = "Tap to Speak";
        }
        function addBubble(text, type) {
            const chatWindow = document.getElementById('chatWindow');
            const bubble = document.createElement('div');
            bubble.className = `bubble ${type}-bubble`;
            bubble.innerText = text;
            chatWindow.appendChild(bubble);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
        async function askAI() {
            const input = document.getElementById('chatInput');
            if (!input.value) return;
            const text = input.value;
            input.value = "";
            addBubble(text, 'user');
            processWithAI(text);
        }
        async function processWithAI(userInput) {
            const chatWindow = document.getElementById('chatWindow');
            const loadingBubble = document.createElement('div');
            loadingBubble.className = 'bubble ai-bubble';
            loadingBubble.innerText = "Thinking... ✨";
            chatWindow.appendChild(loadingBubble);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            const direction = isEnglishToMongolian ? "English to Mongolian" : "Mongolian to English";
            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { 
                                role: "system", 
                                content: `You are a coquette tutor. Translate the user input from ${direction} and explain a grammar rule in a cute way.` 
                            },
                            { role: "user", content: userInput }
                        ]
                    })
                });
                const data = await response.json();
                loadingBubble.innerText = data.choices[0].message.content;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (error) {
                loadingBubble.innerText = "The stars are cloudy...";
            }
        }
    </script>
</body>
</html>

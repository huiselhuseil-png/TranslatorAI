<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: url('https://i.pinimg.com/1200x/42/e4/45/42e445b2a6e64dbecb1840ca7c1fe30f.jpg');
            --choco-bg: url('https://i.pinimg.com/736x/c6/4e/e1/c64ee1326f40cb79dd5936ade21b514b.jpg');
            --lace-transparent: url('https://i.postimg.cc/RCWt0Lwj/oo.png');
            --bow-transparent: url('https://i.postimg.cc/NFZfyTq1/o4.png');
            --corner-l-transparent: url('https://i.postimg.cc/dkZsHQdZ/o.png');
            --corner-r-transparent: url('https://i.postimg.cc/T1K3Y0S2/o2.png');
            --cream: #f9f3e9;
            --btn-overlay: rgba(166, 141, 133, 0.75);
            --text-color: #4e342e;
        }
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f3e5f5; font-family: 'Playfair Display', serif; }
        .phone { width: 380px; height: 750px; background-image: var(--main-bg); background-size: cover; border-radius: 45px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; border: 10px solid white; position: relative; }
        header { background-image: var(--choco-bg); background-size: 100% 120px; background-repeat: no-repeat; padding-top: 15px; position: relative; z-index: 100; height: 70px; }
        .corner-png { position: absolute; top: 0px; width: 65px; height: 65px; z-index: 10; background-size: contain; background-repeat: no-repeat; }
        .left-corner { left: 2px; background-image: var(--corner-l-transparent); }
        .right-corner { right: 2px; background-image: var(--corner-r-transparent); }
        .welcome-card { background-color: var(--cream); margin: 0 50px; padding: 8px 5px; border-radius: 25px 25px 0 0; text-align: center; margin-top: 10px; }
        .welcome-card h1 { font-family: 'Amatic SC', cursive; font-size: 30px; color: var(--text-color); margin: 0; letter-spacing: 4px; }
        .lace-divider { height: 35px; width: 100%; background-image: var(--lace-transparent); background-repeat: repeat-x; background-size: contain; position: relative; z-index: 7; }
        .bow-icon { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 45px; height: 45px; z-index: 25; background-size: contain; background-repeat: no-repeat; background-image: var(--bow-transparent); }
        .content { flex-grow: 1; padding: 25px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .back-btn {
            text-decoration: none;
            color: var(--text-color);
            font-family: 'Quicksand';
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 0.7; transform: translateX(-3px); }
        .lang-toggle {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--cream); padding: 10px 20px; border-radius: 50px;
            font-family: 'Quicksand'; font-weight: bold; color: var(--text-color);
            border: 1px solid rgba(0,0,0,0.1); cursor: pointer;
        }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 5px; }
        .mode-btn {
            flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--btn-overlay);
            background: white; font-family: 'Quicksand'; font-size: 12px; cursor: pointer;
            transition: 0.3s; color: var(--text-color);
        }
        .mode-btn.active { background: var(--btn-overlay); color: white; }
        .input-area { width: 100%; background: rgba(255, 255, 255, 0.7); border: 2px dashed #a68d85; border-radius: 20px; padding: 15px; box-sizing: border-box; }
        textarea { width: 100%; height: 100px; border: none; background: transparent; font-size: 16px; outline: none; resize: none; font-family: 'Quicksand'; }
        .translate-btn {
            background: var(--btn-overlay); color: white; border: none; border-radius: 50px;
            padding: 15px; font-size: 18px; font-family: 'Playfair Display'; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .result-box {
            background: var(--cream); border-radius: 20px; padding: 18px; min-height: 80px;
            font-family: 'Quicksand'; color: var(--text-color); line-height: 1.5; font-size: 14px;
        }
        footer { height: 80px; position: relative; }
        .music { position: absolute; left: 5px; bottom: 5px; width: 150px; mix-blend-mode: multiply; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="phone">
        <header>
            <div class="corner-png left-corner"></div>
            <div class="corner-png right-corner"></div>
            <div class="welcome-card"><h1>TEXT AI</h1></div>
            <div class="lace-divider"><div class="bow-icon"></div></div>
        </header>
        <main class="content">
            <a href="index.html" class="back-btn"><span>⬅</span> Back to Menu</a>
            <div class="mode-selector">
                <button id="btnTrans" class="mode-btn active" onclick="setMode('translate')">Only Translate</button>
                <button id="btnGrammar" class="mode-btn" onclick="setMode('grammar')">Ask & Help Grammar</button>
            </div>
            <div class="lang-toggle" onclick="switchLanguages()">
                <span id="fromLang">English</span>
                <span id="swapIcon">⇄</span>
                <span id="toLang">Mongolian</span>
            </div>
            <div class="input-area">
                <textarea id="textInput" placeholder="Type your message..."></textarea>
            </div>
            <button class="translate-btn" onclick="processRequest()">Go ✨</button>
            <div class="result-box" id="resultOutput">
                Waiting for your words... 
            </div>
        </main>
        <footer>
            <img src="https://i.pinimg.com/474x/7b/bc/4b/7bbc4b637b57ff4c91dbd17858ddc234.jpg" class="music">
        </footer>
    </div>
    <script>
        const apiKey = "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"; 
        let isEnglishToMongolian = true;
        let currentMode = 'translate';
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnTrans').classList.toggle('active', mode === 'translate');
            document.getElementById('btnGrammar').classList.toggle('active', mode === 'grammar');
            document.getElementById('textInput').placeholder = mode === 'translate' ? "Type to translate..." : "Ask me about grammar or words...";
        }
        function switchLanguages() {
            isEnglishToMongolian = !isEnglishToMongolian;
            document.getElementById('fromLang').innerText = isEnglishToMongolian ? "English" : "Mongolian";
            document.getElementById('toLang').innerText = isEnglishToMongolian ? "Mongolian" : "English";
            document.getElementById('swapIcon').style.transform = isEnglishToMongolian ? 'rotate(0deg)' : 'rotate(180deg)';
        }
        async function processRequest() {
            const text = document.getElementById('textInput').value;
            const output = document.getElementById('resultOutput');
            if(!text) return;
            output.innerText = "Processing... ✨";
            const direction = isEnglishToMongolian ? "English to Mongolian" : "Mongolian to English";
            const systemPrompt = currentMode === 'translate' 
                ? `You are a translator. Translate the text accurately from ${direction}.` 
                : `You are a coquette language teacher. Translate from ${direction} and explain a grammar rule used in the sentence cutely.`;
            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: text }
                        ]
                    })
                });
                const data = await response.json();
                output.innerText = data.choices[0].message.content;
            } catch (error) {
                output.innerText = "Error! Check your key and connection. 🎀";
            }
        }
    </script>
</body>
</html>
